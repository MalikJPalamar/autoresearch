# Situational Awareness Portfolio — Cron Jobs
# Install: copy to /etc/cron.d/autoresearch or run cron/setup.sh install
# NOTE: Edit REPO_DIR below to match your installation path.

REPO_DIR=/root/autoresearch
SHELL=/bin/bash
PATH=/usr/local/bin:/usr/bin:/bin

# Loop 1 - Daily SA Report: 9pm CET (19:00 UTC) on weekdays
0 19 * * 1-5 root $REPO_DIR/cron/daily_report.sh

# Loop 2 - Auto-Research: 11pm CET (21:00 UTC) on weekdays
0 21 * * 1-5 root $REPO_DIR/cron/auto_research.sh

# Cleanup: Remove logs older than 30 days (Sundays at 3am UTC)
0 3 * * 0 root find $REPO_DIR/cron/logs -name '*.log' -mtime +30 -delete
